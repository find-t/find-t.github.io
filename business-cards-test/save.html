<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Contact</title>
<style>
  
  body, html {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center; 
    align-items: center;     
    background: #f0f0f0;
    font-family: Arial, sans-serif;
  }

  
  .btn {
    display: inline-block;
    padding: 16px 28px;
    background-color: #007aff;
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    transition: background 0.3s, transform 0.2s;
    text-align: center;
  }

  
  .btn:hover {
    background-color: #005ecb;
    transform: scale(1.05);
  }

  
  @media (max-width: 400px) {
    .btn {
      padding: 14px 24px;
      font-size: 16px;
    }
  }
</style>
</head>
<body>

<a href="#" class="btn" id="saveContact">Save Contact</a>

<script>
  // Dynamic vCard generation
  document.getElementById("saveContact").addEventListener("click", function(e) {
    e.preventDefault(); // prevent default link behavior

    const vcard = `BEGIN:VCARD
VERSION:3.0
FN:John Doe
N:Doe;John;;;
TEL;TYPE=CELL:+123456789
EMAIL:john@example.com
ADR;TYPE=WORK:;;Rheinschanze 6;Basel;;4056;Switzerland
URL:https://www.h.com
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "john-doe.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
  });
</script>

</body>
</html>
